[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

# Proxy all /api/* calls to the serverless Express function
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200
  force = true

# SPA fallback — all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
